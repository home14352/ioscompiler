name: iOS CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  TEAM_ID: ""

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Create ExportOptions.plist
        run: |
          mkdir -p fastlane
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n\t<key>method</key>\n\t<string>ad-hoc</string>\n\t<key>signingCertificate</key>\n\t<string>-</string>\n\t<key>signingStyle</key>\n\t<string>manual</string>\n\t<key>teamId</key>\n\t<string></string>\n\t<key>allowUnsignedDestination</key>\n\t<true/>\n</dict>\n</plist>\n' > fastlane/ExportOptions.plist

      - name: Build TaskCalendar
        run: |
          xcodebuild -project ioscompiler.xcodeproj \
            -scheme TaskCalendar \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/TaskCalendar \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Export IPA
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/TaskCalendar.xcarchive \
            -exportPath build \
            -exportOptionsPlist fastlane/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: build/TaskCalendar.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
