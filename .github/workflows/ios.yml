name: iOS CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Build
        run: |
          xcodebuild -project ioscompiler.xcodeproj \
            -scheme TaskCalendar \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Create IPA
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          cd build
          mkdir -p Payload
          cp -r Build/Products/Release-iphoneos/TaskCalendar.app Payload/
          zip -r TaskCalendar.ipa Payload
          rm -rf Payload
          ls -la *.ipa

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: build/TaskCalendar.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
