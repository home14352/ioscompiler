disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - fatal_error

excluded:
  - Pods
  - .build
  - fastlane
  - .github

line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000
  count_comments: true

cyclomatic_complexity:
  warning: 15
  error: 25

reporter: "xcode"
